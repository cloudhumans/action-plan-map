<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Action Plan — Loft CGI | Cloud Humans</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f6fa;color:#1a1a2e}

.header{background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);color:#fff;padding:40px 48px 36px}
.header h1{font-size:32px;font-weight:700;margin-bottom:8px;letter-spacing:-.5px}
.header .subtitle{font-size:15px;opacity:.75;line-height:1.5;max-width:900px}
.header .meta{margin-top:16px;display:flex;gap:24px;font-size:13px;opacity:.6;flex-wrap:wrap}
.header-badges{display:flex;gap:12px;margin-top:16px;flex-wrap:wrap}
.header-badge{display:inline-flex;align-items:center;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;backdrop-filter:blur(10px)}
.header-badge.tier{background:rgba(124,58,237,.2);border:1px solid rgba(124,58,237,.4);color:#e0e7ff}
.header-badge.health-attention{background:rgba(217,119,6,.2);border:1px solid rgba(217,119,6,.4);color:#fed7aa}

.main{padding:32px 48px;max-width:1200px;margin:0 auto}

section{background:#fff;border-radius:12px;margin-bottom:24px;box-shadow:0 1px 3px rgba(0,0,0,.06);overflow:hidden}
section h2{font-size:18px;font-weight:700;color:#1e293b;padding:20px 24px 12px;border-bottom:1px solid #e2e8f0;display:flex;align-items:center;gap:8px}
.section-content{padding:20px 24px}

/* METRICS TABLE */
.metrics-table{width:100%;border-collapse:collapse;font-size:14px;line-height:1.6}
.metrics-table th{background:#f8fafc;padding:12px 16px;text-align:left;font-weight:700;color:#334155;border-bottom:2px solid #e2e8f0;font-size:13px}
.metrics-table td{padding:12px 16px;border-bottom:1px solid #e8eaf0}
.metrics-table tr:last-child td{border-bottom:none}
.metrics-table .label{color:#475569;font-weight:500}
.metrics-table .value{font-weight:600;color:#1e293b}
.metrics-table .critical{color:#dc2626;font-weight:700}
.metrics-table .attention{color:#d97706}

/* TREND CHART */
.chart-container{margin:16px 0;padding:16px;background:#f8fafc;border-radius:8px}
.chart-bars{display:flex;gap:6px;align-items:flex-end;height:120px;margin:12px 0}
.bar{flex:1;background:linear-gradient(180deg,#3b82f6,#1e40af);border-radius:4px 4px 0 0;position:relative;transition:opacity .2s}
.bar:hover{opacity:.8}
.bar-label{position:absolute;bottom:-20px;font-size:11px;color:#94a3b8;width:100%;text-align:center}

/* N2 BREAKDOWN TABLE */
.breakdown-table{width:100%;border-collapse:collapse;font-size:13px}
.breakdown-table th{background:#f8fafc;padding:10px 12px;text-align:left;font-weight:700;color:#334155;border-bottom:2px solid #e2e8f0}
.breakdown-table td{padding:10px 12px;border-bottom:1px solid #e8eaf0}
.breakdown-table tr:last-child td{border-bottom:none}
.breakdown-reason{font-weight:500;color:#1e293b}
.breakdown-percent{text-align:right;color:#d97706;font-weight:600}

/* ACTIONS */
.action-item{padding:16px;margin:12px 0;border-radius:8px;border-left:4px solid;background:rgba(255,255,255,.5)}
.action-item.p0{border-left-color:#dc2626;background:rgba(254,202,202,.15)}
.action-item.p1{border-left-color:#f59e0b;background:rgba(254,243,199,.15)}
.action-item.p2{border-left-color:#22c55e;background:rgba(187,247,208,.15)}

.action-header{display:flex;align-items:flex-start;gap:12px;margin-bottom:8px}
.action-priority{display:inline-flex;align-items:center;justify-content:center;width:40px;height:40px;border-radius:8px;font-weight:700;font-size:12px;flex-shrink:0}
.action-priority.p0{background:#fecaca;color:#991b1b}
.action-priority.p1{background:#fde68a;color:#92400e}
.action-priority.p2{background:#bbf7d0;color:#166534}

.action-title{font-size:14px;font-weight:700;color:#1e293b;flex:1}
.action-desc{font-size:13px;color:#475569;line-height:1.6;margin:8px 0}
.action-impact{display:flex;gap:16px;padding:8px 0;font-size:12px;margin-top:8px;border-top:1px solid rgba(0,0,0,.05)}
.impact-calc{display:flex;gap:4px}
.impact-calc .num{font-weight:700;color:#1e293b}
.impact-calc .op{color:#94a3b8}

/* SUMMARY TABLE */
.summary-table{width:100%;border-collapse:collapse;font-size:13px}
.summary-table th{background:#f8fafc;padding:12px 16px;text-align:left;font-weight:700;color:#334155;border-bottom:2px solid #e2e8f0}
.summary-table td{padding:12px 16px;border-bottom:1px solid #e8eaf0}
.summary-table tr:last-child td{border-bottom:none}
.summary-label{color:#475569;font-weight:500}
.summary-value{font-weight:700;color:#1e293b;font-size:14px}
.summary-value.positive{color:#059669}

/* FOOTER */
.footer{text-align:center;padding:28px 48px;font-size:12px;color:#94a3b8;border-top:1px solid #e8eaf0;margin-top:32px}
.footer a{color:#6366f1;text-decoration:none;font-weight:600}
.footer a:hover{text-decoration:underline}

@media(max-width:900px){
  .header,.main,.footer{padding-left:20px;padding-right:20px}
  .header h1{font-size:24px}
  .metrics-table,.breakdown-table,.summary-table{font-size:12px}
  .metrics-table th,.breakdown-table th,.summary-table th{padding:8px 12px}
  .metrics-table td,.breakdown-table td,.summary-table td{padding:8px 12px}
}
</style>

<style id="lock-style">
.lock{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);z-index:99999;padding:20px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
.lock::before{content:'';position:absolute;right:-160px;top:-160px;width:520px;height:520px;background:radial-gradient(circle,rgba(99,102,241,.35),transparent 70%);border-radius:50%}
.lock::after{content:'';position:absolute;left:-100px;bottom:-200px;width:380px;height:380px;background:radial-gradient(circle,rgba(124,58,237,.25),transparent 70%);border-radius:50%}
.lock-card{background:#fff;border-radius:18px;padding:48px 44px;max-width:440px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.4);position:relative;z-index:1}
.lock-brand{display:flex;align-items:center;gap:10px;font-weight:700;font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:#4f46e5;margin-bottom:18px}
.lock-brand .dot{width:8px;height:8px;border-radius:50%;background:#4f46e5;box-shadow:0 0 0 4px rgba(99,102,241,.18)}
.lock-card h1{font-size:22px;font-weight:800;color:#1a1a2e;margin-bottom:8px;letter-spacing:-.02em}
.lock-card .lock-sub{color:#64748b;font-size:14px;margin-bottom:28px;line-height:1.5}
.lock-form label{display:block;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:#1a1a2e;margin-bottom:8px}
.lock-form input{width:100%;padding:14px 16px;border:2px solid #e2e8f0;border-radius:10px;font:inherit;font-size:15px;color:#1a1a2e;transition:border-color .15s,box-shadow .15s;outline:0;box-sizing:border-box}
.lock-form input:focus{border-color:#4f46e5;box-shadow:0 0 0 4px rgba(99,102,241,.15)}
.lock-form button{width:100%;margin-top:14px;padding:14px;background:linear-gradient(90deg,#4f46e5,#7c3aed);color:#fff;border:0;border-radius:10px;font:inherit;font-weight:700;font-size:15px;cursor:pointer;transition:transform .1s,box-shadow .15s}
.lock-form button:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(99,102,241,.4)}
.lock-form button:disabled{opacity:.6;cursor:wait;transform:none}
.lock-error{margin-top:14px;padding:10px 14px;background:#fef2f2;color:#dc2626;border-radius:8px;font-size:13px;font-weight:600;display:none}
.lock-error.show{display:block}
.lock-foot{margin-top:24px;padding-top:20px;border-top:1px solid #e2e8f0;font-size:12px;color:#64748b;text-align:center;line-height:1.6}
.lock-foot strong{color:#1a1a2e}
#__locked__ body{overflow:hidden}
</style>
</head>

</div>

async function decryptToString(b64, password){
  const data = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
  const salt = data.slice(0, 16);
  const iv = data.slice(16, 28);
  const ct = data.slice(28);
  const km = await crypto.subtle.importKey('raw', new TextEncoder().encode(password), 'PBKDF2', false, ['deriveKey']);
  const key = await crypto.subtle.deriveKey(
    {name:'PBKDF2', salt, iterations:100000, hash:'SHA-256'},
    km, {name:'AES-GCM', length:256}, false, ['decrypt']
  );
  const pt = await crypto.subtle.decrypt({name:'AES-GCM', iv}, key, ct);
  return new TextDecoder().decode(pt);
}
async function unlockWith(pwd) {
  const html = await decryptToString(REPORT_ENC, pwd);
  const root = document.getElementById('report-root');
  root.innerHTML = html;
  root.querySelectorAll('script').forEach(old => {
    const s = document.createElement('script');
    for (const attr of old.attributes) s.setAttribute(attr.name, attr.value);
    s.text = old.textContent;
    old.parentNode.replaceChild(s, old);
  });
  document.getElementById('lock').style.display = 'none';
  root.style.display = 'block';
}
document.getElementById('lockForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('lockBtn');
  const err = document.getElementById('lockErr');
  const pwd = document.getElementById('pwd').value;
  err.classList.remove('show');
  btn.disabled = true; btn.textContent = 'Desbloqueando...';
  try {
    await unlockWith(pwd);
    sessionStorage.setItem('ap_report_loft_cgi', pwd);
  } catch(_) {
    err.classList.add('show');
    btn.disabled = false; btn.textContent = 'Desbloquear';
  }
});
(async () => {
  const cached = sessionStorage.getItem('ap_report_loft_cgi');
  if (!cached) return;
  try { await unlockWith(cached); } catch(_){}
})();
